<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YouTube Offline Viewer</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1a1a">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
</head>
<body>
    <div id="offlineIndicator" class="offline-indicator hidden">오프라인 모드: 서버와 연결되지 않았습니다.</div>
    <header>
        <h1>📺 YouTube Offline Viewer</h1>
    </header>

    <main>
        <section class="download-section">
            <div class="input-group">
                <input type="text" id="urlInput" placeholder="유튜브 영상 주소를 붙여넣으세요(예:https://youtu.be/...)">
                <button id="downloadBtn">다운로드</button>
            </div>
            <div id="statusMessage" class="status-msg"></div>
            <div id="progressBarContainer" class="progress-container hidden">
                <div id="progressBar" class="progress-bar">0%</div>
            </div>
        </section>

        <section class="library-section">
            <h2>나의 보관함</h2>
            <div id="libraryList" class="library-grid">
                <!-- 영상 목록이 여기에 렌더링됩니다 -->
            </div>
        </section>
    </main>

    <!-- 비디오 플레이어 모달 -->
    <div id="videoModal" class="modal hidden">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h3 id="modalTitle">영상 제목</h3>
            <video id="videoPlayer" controls></video>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(err => console.log('SW registration failed:', err));
            });
        }
    </script>
</body>
</html>
